<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theory-Forge Navigator</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242835;
  --border: #2e3345;
  --text: #e1e4ed;
  --text-dim: #8b90a0;
  --accent: #6c8aff;
  --accent-dim: #3d5199;
  --green: #4ade80;
  --yellow: #fbbf24;
  --red: #f87171;
  --orange: #fb923c;
  --purple: #a78bfa;
  --cyan: #22d3ee;
  --pink: #f472b6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); overflow:hidden; height:100vh; }

/* NAV */
nav { display:flex; align-items:center; gap:16px; padding:12px 24px; background:var(--surface); border-bottom:1px solid var(--border); }
nav h1 { font-size:18px; font-weight:700; color:var(--accent); white-space:nowrap; }
nav .tabs { display:flex; gap:4px; }
nav .tab { padding:6px 16px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; color:var(--text-dim); background:transparent; border:none; transition:all .15s; }
nav .tab:hover { color:var(--text); background:var(--surface2); }
nav .tab.active { color:var(--accent); background:var(--accent-dim); }
nav .spacer { flex:1; }
nav .stats { font-size:12px; color:var(--text-dim); }

/* VIEWS */
.view { display:none; height:calc(100vh - 49px); }
.view.active { display:flex; }

/* === REVIEW VIEW === */
#review { display:none; }
#review.active { display:flex; }
.review-sidebar { width:260px; min-width:260px; background:var(--surface); border-right:1px solid var(--border); overflow-y:auto; padding:12px; }
.review-main { flex:1; overflow-y:auto; padding:32px 48px; }
.skill-btn { display:block; width:100%; text-align:left; padding:10px 12px; border:none; background:transparent; color:var(--text-dim); font-size:13px; border-radius:6px; cursor:pointer; margin-bottom:2px; transition:all .15s; }
.skill-btn:hover { background:var(--surface2); color:var(--text); }
.skill-btn.active { background:var(--accent-dim); color:var(--accent); font-weight:600; }
.skill-btn .badge { float:right; font-size:11px; padding:1px 6px; border-radius:8px; }
.skill-btn .badge.done { background:#1a3a2a; color:var(--green); }
.skill-btn .badge.partial { background:#3a2a1a; color:var(--yellow); }
.skill-btn .badge.empty { background:var(--surface2); color:var(--text-dim); }

.skill-header { margin-bottom:32px; }
.skill-header h2 { font-size:28px; font-weight:700; margin-bottom:8px; }
.skill-header .meta { font-size:13px; color:var(--text-dim); }
.skill-header .score-badge { display:inline-block; padding:4px 12px; border-radius:12px; font-size:13px; font-weight:600; background:var(--accent-dim); color:var(--accent); margin-left:8px; }

.dimension { background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:20px; overflow:hidden; }
.dimension-header { padding:16px 20px; cursor:pointer; display:flex; align-items:center; gap:12px; }
.dimension-header:hover { background:var(--surface2); }
.dimension-header .num { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }
.dimension-header h3 { font-size:15px; font-weight:600; flex:1; }
.dimension-header .type-tag { font-size:11px; padding:2px 8px; border-radius:4px; background:var(--surface2); color:var(--text-dim); }
.dimension-header .chevron { color:var(--text-dim); transition:transform .2s; font-size:12px; }
.dimension.open .chevron { transform:rotate(90deg); }
.dimension-body { display:none; padding:0 20px 20px; }
.dimension.open .dimension-body { display:block; }

.check-card { padding:16px 0; border-bottom:1px solid var(--border); font-size:13px; }
.check-card:last-of-type { border-bottom:none; }
.check-card-top { display:flex; align-items:flex-start; gap:12px; margin-bottom:8px; }
.check-card-top .check-name { font-weight:700; color:var(--text); font-size:14px; flex:1; }
.check-card-top .annotation-btns { display:flex; gap:4px; flex-shrink:0; }
.check-desc { color:var(--text-dim); line-height:1.55; margin-bottom:10px; font-size:13px; }
.check-passfail { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.check-passfail .pf-box { padding:10px 12px; border-radius:8px; font-size:12px; line-height:1.5; }
.check-passfail .pf-box.pass-box { background:rgba(74,222,128,0.06); border:1px solid rgba(74,222,128,0.15); }
.check-passfail .pf-box.fail-box { background:rgba(248,113,113,0.06); border:1px solid rgba(248,113,113,0.15); }
.check-passfail .pf-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
.check-passfail .pf-label.pass-label { color:var(--green); }
.check-passfail .pf-label.fail-label { color:var(--red); }
.check-passfail .pf-text { color:var(--text); }
.ann-btn { width:28px; height:28px; border-radius:6px; border:1px solid var(--border); background:transparent; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.ann-btn:hover { background:var(--surface2); }
.ann-btn.agree { border-color:var(--green); color:var(--green); background:rgba(74,222,128,0.1); }
.ann-btn.disagree { border-color:var(--red); color:var(--red); background:rgba(248,113,113,0.1); }
.ann-btn.question { border-color:var(--yellow); color:var(--yellow); background:rgba(251,191,36,0.1); }

.notes-area { margin-top:8px; }
.notes-area textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:8px 12px; color:var(--text); font-size:13px; font-family:inherit; resize:vertical; min-height:60px; }
.notes-area textarea:focus { outline:none; border-color:var(--accent); }

.failure-modes { margin-top:12px; }
.failure-modes h4 { font-size:13px; font-weight:600; color:var(--orange); margin-bottom:8px; }
.fm-row { display:flex; gap:12px; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; align-items:center; }
.fm-row:last-child { border-bottom:none; }
.fm-name { font-weight:600; min-width:200px; }
.fm-detection { color:var(--text-dim); flex:1; }

/* === MAP VIEW === */
#map { display:none; position:relative; }
#map.active { display:block; }
#map-canvas { width:100%; height:100%; }
.map-container { width:100%; height:calc(100vh - 49px); overflow:auto; position:relative; }

/* Map phase regions */
.phase-region { position:absolute; border-radius:16px; border:1px solid var(--border); padding:16px; }
.phase-region h3 { font-size:14px; font-weight:700; margin-bottom:12px; letter-spacing:0.5px; text-transform:uppercase; }

.skill-node { position:absolute; padding:8px 14px; border-radius:8px; font-size:12px; font-weight:500; cursor:pointer; border:1px solid; transition:all .15s; white-space:nowrap; z-index:2; }
.skill-node:hover { transform:scale(1.05); z-index:10; box-shadow:0 4px 20px rgba(0,0,0,0.4); }
.skill-node.eval { background:rgba(108,138,255,0.15); border-color:var(--accent); color:var(--accent); }
.skill-node.discovery { background:rgba(74,222,128,0.15); border-color:var(--green); color:var(--green); }
.skill-node.framing { background:rgba(167,139,250,0.15); border-color:var(--purple); color:var(--purple); }
.skill-node.output { background:rgba(251,191,36,0.15); border-color:var(--yellow); color:var(--yellow); }
.skill-node.meta { background:rgba(139,144,160,0.15); border-color:var(--text-dim); color:var(--text-dim); }
.skill-node.adversarial { background:rgba(248,113,113,0.15); border-color:var(--red); color:var(--red); }
.skill-node.section-eval { background:rgba(34,211,238,0.15); border-color:var(--cyan); color:var(--cyan); border-width:2px; box-shadow:0 0 12px rgba(34,211,238,0.25); }
.skill-node.section-eval::after { content:"NEW"; position:absolute; top:-8px; right:-8px; font-size:9px; font-weight:800; padding:1px 5px; border-radius:4px; background:var(--cyan); color:var(--bg); letter-spacing:0.5px; }

@keyframes new-pulse { 0%,100% { box-shadow:0 0 12px rgba(34,211,238,0.25); } 50% { box-shadow:0 0 20px rgba(34,211,238,0.45); } }
.skill-node.section-eval { animation:new-pulse 3s ease-in-out infinite; }

.tooltip { display:none; position:fixed; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 16px; max-width:320px; font-size:13px; z-index:100; box-shadow:0 8px 32px rgba(0,0,0,0.5); pointer-events:none; }
.tooltip h4 { font-weight:700; margin-bottom:4px; }
.tooltip p { color:var(--text-dim); line-height:1.4; }
.tooltip .score { margin-top:6px; font-size:12px; color:var(--accent); }

/* SVG arrows */
svg.arrows { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; }
svg.arrows path { fill:none; stroke:var(--border); stroke-width:1.5; stroke-dasharray:4,4; }
svg.arrows path.flow { stroke:var(--text-dim); stroke-width:2; stroke-dasharray:6,4; opacity:0.4; }

/* Export panel */
.export-panel { position:fixed; bottom:20px; right:20px; z-index:50; display:flex; gap:8px; }
.export-btn { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:13px; cursor:pointer; transition:all .15s; }
.export-btn:hover { background:var(--accent-dim); color:var(--accent); border-color:var(--accent); }
.export-btn.primary { background:var(--accent); color:white; border-color:var(--accent); }
.export-btn.primary:hover { background:#5a7ae6; }

/* Legend */
.legend { position:absolute; bottom:20px; left:20px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; z-index:10; }
.legend h4 { font-size:12px; font-weight:700; margin-bottom:8px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; }
.legend-item { display:flex; align-items:center; gap:8px; font-size:12px; margin-bottom:4px; }
.legend-dot { width:10px; height:10px; border-radius:3px; }

/* Scrollbar */
::-webkit-scrollbar { width:8px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
::-webkit-scrollbar-thumb:hover { background:var(--text-dim); }
</style>
</head>
<body>

<nav>
  <h1>Theory-Forge Navigator</h1>
  <div class="tabs">
    <button class="tab active" onclick="showView('review')">Review Standards</button>
    <button class="tab" onclick="showView('map')">Skill Map</button>
  </div>
  <div class="spacer"></div>
  <div class="stats" id="global-stats"></div>
</nav>

<div id="review" class="view active">
  <div class="review-sidebar" id="sidebar"></div>
  <div class="review-main" id="main-content">
    <div style="text-align:center;padding:80px 40px;color:var(--text-dim)">
      <p style="font-size:48px;margin-bottom:16px">&#8592;</p>
      <p style="font-size:15px">Select an eval skill to review its dimensions, checks, and standards.</p>
      <p style="font-size:13px;margin-top:8px">Mark each check as agree / disagree / question, add notes, and export when done.</p>
    </div>
  </div>
</div>

<div id="map" class="view">
  <div class="map-container" id="map-container"></div>
</div>

<div class="export-panel" id="export-panel" style="display:none">
  <button class="export-btn" onclick="exportAnnotations()">Export Annotations (JSON)</button>
  <button class="export-btn" onclick="exportSummary()">Export Summary (MD)</button>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ============================================================
// DATA: All eval skills with full dimensional structure
// ============================================================
const EVAL_SKILLS = [
  {
    "id": "eval-introduction",
    "totalScore": 30,
    "thresholds": {
      "pass": 24,
      "conditional": 18
    },
    "dimensions": [
      {
        "name": "Arc Structure",
        "checks": [
          {
            "c": "Arc steps order",
            "d": "A strong introduction follows a specific sequence: it starts with a broad phenomenon the reader already cares about, narrows to what we don't know, and then previews how this paper fills that gap. This check verifies that sequence is present and in the right order. Scrambling the order confuses readers about why they should keep reading.",
            "p": "Clear progression from broad phenomenon → what's known → what's missing → this paper's response. Each paragraph advances to the next stage without backtracking.",
            "f": "Sections appear out of order — e.g., the research question shows up before the gap is established, or the paper jumps from a broad opening straight to methods without building the case for why the study matters."
          },
          {
            "c": "One turn",
            "d": "The best introductions have exactly one major intellectual turn — the moment where the reader realizes 'oh, we don't actually know this important thing.' Multiple turns dilute the argument and make the reader feel like the paper is about several different problems. This checks that your introduction makes one clean pivot from 'here's what we know' to 'here's what we're missing.'",
            "p": "A single, clearly identifiable moment where the text shifts from established knowledge to the gap. The reader feels one clean pivot.",
            "f": "Multiple competing gaps or turns that make the reader unsure which problem the paper is actually solving. The introduction seems to restart its argument partway through."
          },
          {
            "c": "Opening sentence",
            "d": "The very first sentence sets the reader's frame for everything that follows. It should land on a phenomenon or tension that a broad audience in the field already recognizes and cares about — not a narrow theoretical debate. Think of it as the 'hook' that earns you the next paragraph of attention.",
            "p": "First sentence names a recognizable, real-world phenomenon or tension that the target audience encounters in their own work or world. It feels concrete and immediate.",
            "f": "Opens with a dictionary definition, a sweeping claim about 'the modern world,' a narrow theoretical statement only specialists would care about, or a citation-heavy sentence that reads like a literature review."
          },
          {
            "c": "Cold open",
            "d": "A 'cold open' means the introduction drops you into the phenomenon without lengthy setup or throat-clearing. The reader should feel the relevance within the first few sentences, not after a page of background. This checks that you get to the point quickly and trust the reader to follow.",
            "p": "The reader understands what this paper is about and why it matters within the first paragraph. No preamble about the history of the field or broad societal trends before getting specific.",
            "f": "The first page reads like a textbook chapter — extensive background, definitions, or historical context before the reader has any reason to care about it."
          },
          {
            "c": "No tracking paragraphs",
            "d": "Tracking paragraphs are those meta-commentary passages like 'In the next section, we review the literature. Then we describe our methods.' They add word count without adding intellectual value, and they signal that the introduction isn't doing its job of building momentum. Reviewers see them as filler.",
            "p": "The introduction flows naturally from one idea to the next without needing a roadmap paragraph to tell the reader what's coming. Structure is implicit in the argument's logic.",
            "f": "Contains a paragraph (usually near the end of the introduction) that just lists what each upcoming section covers, like a table of contents in prose form."
          }
        ],
        "num": 1,
        "type": "Mechanical"
      },
      {
        "name": "Gap Construction",
        "checks": [
          {
            "c": "Gap type identifiable",
            "d": "There are different kinds of intellectual gaps — maybe nobody has studied this phenomenon, maybe they've studied it but with the wrong theory, maybe we have theory but no mechanism. The type of gap you're claiming shapes everything else in the paper. This checks whether a reader can clearly name what kind of gap you're arguing exists.",
            "p": "A reader could summarize the gap in one sentence and identify its type: 'Nobody has studied X,' 'We have studies but they miss the mechanism behind Y,' or 'Existing theory can't explain Z.' The gap type is unmistakable.",
            "f": "The gap is vague — something like 'more research is needed' or 'this area is understudied' without specifying what kind of knowledge is missing and why that specific absence matters."
          },
          {
            "c": "Prior work named",
            "d": "You can't argue something is missing from the literature unless you show what the literature actually contains. This checks that you cite specific prior studies and explain what they found, so the gap feels like a genuine hole in existing knowledge rather than just something you haven't read yet.",
            "p": "Key prior studies are named, their findings are briefly characterized, and it's clear what they collectively accomplish and where they collectively fall short.",
            "f": "The gap is asserted without evidence — phrases like 'little research has examined' without naming who has done related work, or citing studies without explaining what they actually found."
          },
          {
            "c": "Absence about mechanism",
            "d": "The most compelling gaps in qualitative research aren't just 'nobody has looked at X' — they're 'we don't understand how or why X works.' Mechanism-level gaps are harder to dismiss because they point to genuine explanatory limits in existing knowledge. This checks whether your gap targets a process, mechanism, or explanatory logic rather than just a missing topic.",
            "p": "The gap explicitly targets how or why something happens — a missing process, mechanism, or causal logic that existing studies have not explained.",
            "f": "The gap is purely topical ('nobody has studied remote workers in healthcare') without explaining what explanatory understanding is missing or why studying that topic would advance theory."
          },
          {
            "c": "Defensible",
            "d": "A reviewer's first instinct when reading your gap will be to think of a paper that already fills it. This checks whether your gap would survive that challenge — whether you've drawn the boundaries precisely enough that a knowledgeable reviewer couldn't immediately name a study that makes your gap disappear.",
            "p": "The gap is drawn precisely enough that a reviewer familiar with the field couldn't easily name an existing paper that already fills it. Boundary conditions are clear.",
            "f": "The gap is so broadly stated that a reviewer could list several papers that address it, or it ignores well-known work that partially fills the claimed gap."
          },
          {
            "c": "Gap-contribution coherence",
            "d": "Your gap and your contribution should be mirror images — the gap says 'here's what's missing' and the contribution says 'here's what we provide.' If they don't match, the paper feels like it answered a different question than it asked. This checks that what you promise to deliver directly addresses the specific gap you identified.",
            "p": "The contribution directly fills the stated gap. If the gap is about missing mechanism, the contribution provides mechanism. The match is tight and obvious.",
            "f": "The gap and contribution are in different neighborhoods — e.g., the gap is about missing theory but the contribution is primarily empirical, or the gap targets one phenomenon but the findings address a related but different one."
          },
          {
            "c": "Scope calibrated",
            "d": "Your gap needs to be the right size for one paper. Too big and reviewers will say you can't possibly address it adequately; too small and they'll wonder why they should care. This checks whether the gap is sized to what your study can actually deliver — ambitious enough to matter, focused enough to be credible.",
            "p": "The gap is large enough to justify a full paper but small enough that the study's data and method can credibly address it. Feels proportionate to the empirical work.",
            "f": "The gap is either so enormous that no single study could fill it ('we don't understand how organizations work') or so tiny that it feels like a footnote rather than a paper ('no one has studied this specific team in this specific month')."
          }
        ],
        "num": 2,
        "type": "Strategic"
      },
      {
        "name": "Stakes Escalation",
        "checks": [
          {
            "c": "Practical stakes",
            "d": "Reviewers and readers need to know why this gap matters for real-world practice — what decisions are being made poorly, what problems persist, what practitioners are getting wrong because this knowledge doesn't exist yet. This checks that you've connected your gap to tangible, real-world consequences.",
            "p": "The paper explains what practitioners, organizations, or society gets wrong or can't do well because this knowledge is missing. The stakes feel concrete and grounded.",
            "f": "No connection to practice, or vague gestures like 'this has important implications for managers' without specifying what those implications are or why current practice is inadequate."
          },
          {
            "c": "Theoretical stakes",
            "d": "Beyond practice, your gap should matter for how scholars think about a broader theoretical question. Filling this gap should change or extend a theory, concept, or framework that other researchers use. This checks that you've made the case for why your findings will matter to the academic conversation, not just to practitioners.",
            "p": "The paper explains which theory, concept, or scholarly debate will be advanced by filling this gap. A reader can see how the contribution connects to a larger intellectual project.",
            "f": "Theoretical stakes are absent or generic — e.g., 'this contributes to our understanding of organizations' without naming which theoretical conversation benefits or how."
          },
          {
            "c": "Stakes escalate",
            "d": "The introduction should build a sense of mounting importance — starting with why this matters practically, then showing it also matters theoretically, so the reader feels increasing urgency. If stakes are flat or front-loaded, the introduction loses momentum right when it needs to be building toward the research question.",
            "p": "Stakes build progressively — practical importance establishes relevance, then theoretical importance raises the intellectual payoff. The reader feels growing urgency as the introduction progresses.",
            "f": "Stakes are presented flatly (all at once) or in reverse order (big theoretical claim first, then deflating to small practical point), killing the sense of building momentum."
          },
          {
            "c": "Calibrated to journal",
            "d": "Different journals expect different levels of ambition. A top-tier generalist journal like ASQ or AMJ expects you to claim broad theoretical significance; a specialty journal expects deep engagement with a specific conversation. This checks that your stakes match the ambition level and audience of your target outlet.",
            "p": "The level of claimed importance matches the target journal. Top-tier journal submissions make broad theoretical claims; specialty journals make focused, deep contributions to specific conversations.",
            "f": "Stakes are wildly mismatched to the outlet — either overclaiming for a specialty journal (claiming to revolutionize the field) or underclaiming for a top-tier journal (only promising a narrow empirical contribution)."
          },
          {
            "c": "No defensive over-justification",
            "d": "When authors are insecure about their gap, they tend to pile on justifications — citing dozens of papers calling for more research, quoting editors' calls for papers, etc. This paradoxically signals weakness because it suggests the gap can't stand on its own intellectual merits. This checks that your stakes feel confident rather than defensive.",
            "p": "The argument for why this matters is confident and self-sufficient. One or two strong reasons, stated clearly, without piling on citations or appeals to authority to prop up the case.",
            "f": "Excessive justification — citing multiple scholars who have 'called for' this research, quoting journal editors, listing every reason this matters as if trying to preempt reviewer skepticism. Reads as insecure."
          },
          {
            "c": "Reader would feel the gap",
            "d": "This is the ultimate gut-check: after reading your introduction, does a reader in your field actually feel bothered by the gap you've identified? Not just intellectually acknowledge it, but feel that this is something that genuinely needs to be resolved. This is less about logic and more about whether your rhetorical execution creates a felt need.",
            "p": "A knowledgeable reader finishes the gap statement and thinks 'huh, that really is a problem — I want to know how this paper addresses it.' The gap creates genuine intellectual discomfort.",
            "f": "The reader acknowledges the gap exists but shrugs — it doesn't feel urgent, surprising, or consequential. The reaction is 'sure, I guess nobody has looked at that' rather than 'wow, how do we not know this?'"
          }
        ],
        "num": 3,
        "type": "Persuasive"
      },
      {
        "name": "Research Question & Preview",
        "checks": [
          {
            "c": "RQ present and clear",
            "d": "The research question is the single most important sentence in your paper — it tells the reader exactly what you set out to learn. This checks that there is an explicit, clearly stated research question (not just an implied one buried in a paragraph) and that a reader could repeat it back to you without confusion.",
            "p": "A single, explicitly stated research question that a reader can find and repeat back. It's unmistakable — not buried in a paragraph or split across multiple sentences.",
            "f": "No explicit research question, or the question is vague, compound (asking three things at once), or buried so deeply in the text that a reader could miss it."
          },
          {
            "c": "RQ form matches method",
            "d": "The way you phrase your question signals what kind of answer you'll provide. 'How does X happen?' invites process theory. 'What is the relationship between X and Y?' invites variance theory. If your question implies one kind of answer but your method delivers another, reviewers will notice the mismatch immediately.",
            "p": "The grammatical form of the question matches the method — 'how' questions paired with process/qualitative methods, 'what is the effect' questions paired with variance/quantitative methods.",
            "f": "The question form and method contradict each other — e.g., a 'what is the effect of' question answered with ethnographic fieldwork, or a 'how does' question answered with regression analysis."
          },
          {
            "c": "RQ answerable",
            "d": "A good research question can actually be answered with the data and methods you have. This checks that the question isn't so broad that no single study could address it, and isn't so narrow that the answer is trivially obvious. It should be ambitious but feasible given your empirical approach.",
            "p": "The question can be credibly answered with the study design described. It's neither so broad that it would require a career's worth of research nor so narrow that the answer is self-evident.",
            "f": "The question is unanswerable with the study's data (e.g., asking about causation from a cross-sectional design) or so narrow that the answer doesn't justify a full paper."
          },

// ============================================================
// STATE
// ============================================================
let annotations = {};
let currentSkill = null;

function loadState() {
  try {
    const saved = localStorage.getItem('tf-navigator-annotations');
    if (saved) annotations = JSON.parse(saved);
  } catch(e) {}
}
function saveState() {
  localStorage.setItem('tf-navigator-annotations', JSON.stringify(annotations));
  updateStats();
  updateSidebarBadges();
}
function getAnn(skillId, dimNum, checkIdx) {
  return annotations[`${skillId}|${dimNum}|${checkIdx}`] || {};
}
function setAnn(skillId, dimNum, checkIdx, key, value) {
  const k = `${skillId}|${dimNum}|${checkIdx}`;
  if (!annotations[k]) annotations[k] = {};
  annotations[k][key] = value;
  saveState();
}

// ============================================================
// VIEW SWITCHING
// ============================================================
function showView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(view).classList.add('active');
  document.querySelector(`.tab[onclick="showView('${view}')"]`).classList.add('active');
  document.getElementById('export-panel').style.display = view === 'review' ? 'flex' : 'none';
}

// ============================================================
// REVIEW VIEW
// ============================================================
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);margin-bottom:12px;padding:0 12px">Section-Level Eval Skills</div>';
  EVAL_SKILLS.forEach(skill => {
    const btn = document.createElement('button');
    btn.className = 'skill-btn';
    btn.id = `btn-${skill.id}`;
    const isNew = skill.id !== 'eval-introduction';
    const newTag = isNew ? '<span style="font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;background:var(--cyan);color:var(--bg);margin-right:6px">NEW</span>' : '';
    btn.innerHTML = `${newTag}${skill.name} <span class="badge empty" id="badge-${skill.id}">0%</span>`;
    btn.onclick = () => selectSkill(skill.id);
    sb.appendChild(btn);
  });
}

function updateSidebarBadges() {
  EVAL_SKILLS.forEach(skill => {
    let total = 0, done = 0;
    skill.dimensions.forEach(dim => {
      dim.checks.forEach((_, ci) => {
        total++;
        const a = getAnn(skill.id, dim.num, ci);
        if (a.status) done++;
      });
    });
    const pct = total ? Math.round(done/total*100) : 0;
    const badge = document.getElementById(`badge-${skill.id}`);
    if (badge) {
      badge.textContent = `${pct}%`;
      badge.className = `badge ${pct === 100 ? 'done' : pct > 0 ? 'partial' : 'empty'}`;
    }
  });
}

function updateStats() {
  let total = 0, agree = 0, disagree = 0, question = 0;
  Object.values(annotations).forEach(a => {
    if (a.status) { total++; if (a.status==='agree') agree++; if (a.status==='disagree') disagree++; if (a.status==='question') question++; }
  });
  document.getElementById('global-stats').textContent = total ? `Reviewed: ${total} | Agree: ${agree} | Disagree: ${disagree} | Questions: ${question}` : '';
}

function selectSkill(skillId) {
  currentSkill = EVAL_SKILLS.find(s => s.id === skillId);
  document.querySelectorAll('.skill-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${skillId}`).classList.add('active');
  renderSkill(currentSkill);
}

function renderSkill(skill) {
  const main = document.getElementById('main-content');
  let html = `
    <div class="skill-header">
      <h2>${skill.name}</h2>
      <div class="meta">
        /${skill.id} <span class="score-badge">Score: /${skill.totalScore}</span>
        <span class="score-badge" style="background:rgba(74,222,128,0.15);color:var(--green)">PASS \u2265${skill.thresholds.pass}</span>
        <span class="score-badge" style="background:rgba(251,191,36,0.15);color:var(--yellow)">COND ${skill.thresholds.conditional}-${skill.thresholds.pass-1}</span>
        <span class="score-badge" style="background:rgba(248,113,113,0.15);color:var(--red)">FAIL <${skill.thresholds.conditional}</span>
      </div>
    </div>`;

  skill.dimensions.forEach(dim => {
    const isFailure = dim.name.includes('Failure');
    html += `
    <div class="dimension open" id="dim-${skill.id}-${dim.num}">
      <div class="dimension-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="num" style="background:${isFailure ? 'rgba(248,113,113,0.2);color:var(--red)' : 'var(--accent-dim);color:var(--accent)'}">${dim.num}</div>
        <h3>${dim.name}</h3>
        <span class="type-tag">${dim.type}</span>
        <span class="chevron">\u25B6</span>
      </div>
      <div class="dimension-body">`;

    dim.checks.forEach((check, ci) => {
      const a = getAnn(skill.id, dim.num, ci);
      html += `
        <div class="check-card">
          <div class="check-card-top">
            <div class="check-name">${check.c}</div>
            <div class="annotation-btns">
              <button class="ann-btn ${a.status==='agree'?'agree':''}" onclick="annotate('${skill.id}',${dim.num},${ci},'agree')" title="Agree">\u2713</button>
              <button class="ann-btn ${a.status==='disagree'?'disagree':''}" onclick="annotate('${skill.id}',${dim.num},${ci},'disagree')" title="Disagree">\u2717</button>
              <button class="ann-btn ${a.status==='question'?'question':''}" onclick="annotate('${skill.id}',${dim.num},${ci},'question')" title="Question">?</button>
            </div>
          </div>
          ${check.d ? '<div class="check-desc">'+check.d+'</div>' : ''}
          <div class="check-passfail">
            <div class="pf-box pass-box"><div class="pf-label pass-label">Looks like this when done well</div><div class="pf-text">${check.p}</div></div>
            <div class="pf-box fail-box"><div class="pf-label fail-label">Looks like this when it fails</div><div class="pf-text">${check.f}</div></div>
          </div>
          <div class="notes-area">
            <textarea placeholder="Notes, disagreements, questions..." oninput="setAnn('${skill.id}',${dim.num},${ci},'notes',this.value)">${a.notes||''}</textarea>
          </div>
        </div>`;
    });
    html += '</div></div>';
  });

  main.innerHTML = html;
}

function annotate(skillId, dimNum, checkIdx, status) {
  const current = getAnn(skillId, dimNum, checkIdx);
  if (current.status === status) {
    setAnn(skillId, dimNum, checkIdx, 'status', null);
  } else {
    setAnn(skillId, dimNum, checkIdx, 'status', status);
  }
  if (currentSkill && currentSkill.id === skillId) renderSkill(currentSkill);
}

    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Whole-Paper Evals</div>

function showTooltip(e, name, desc) {
  const tt = document.getElementById('tooltip');
  tt.innerHTML = `<h4>${name}</h4><p>${desc}</p>`;
  tt.style.display = 'block';
  tt.style.left = (e.clientX + 16) + 'px';
  tt.style.top = (e.clientY - 8) + 'px';
}
function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

// ============================================================
// EXPORT
// ============================================================
function exportAnnotations() {
  const data = {exported: new Date().toISOString(), annotations};
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  download(blob, 'theory-forge-review-annotations.json');
}

function exportSummary() {
  let md = `# Theory-Forge Standards Review\n\nExported: ${new Date().toISOString()}\n\n`;
  const byStatus = {agree:[], disagree:[], question:[]};

  EVAL_SKILLS.forEach(skill => {
    skill.dimensions.forEach(dim => {
      dim.checks.forEach((check, ci) => {
        const a = getAnn(skill.id, dim.num, ci);
        if (a.status) {
          byStatus[a.status].push({skill: skill.name, dim: dim.name, check: check.c, notes: a.notes || ''});
        }
      });
    });
  });

  if (byStatus.disagree.length) {
    md += `## Disagreements (${byStatus.disagree.length})\n\n`;
    byStatus.disagree.forEach(item => {
      md += `- **${item.skill} > ${item.dim} > ${item.check}**${item.notes ? '\n  ' + item.notes : ''}\n`;
    });
    md += '\n';
  }
  if (byStatus.question.length) {
    md += `## Questions (${byStatus.question.length})\n\n`;
    byStatus.question.forEach(item => {
      md += `- **${item.skill} > ${item.dim} > ${item.check}**${item.notes ? '\n  ' + item.notes : ''}\n`;
    });
    md += '\n';
  }
  if (byStatus.agree.length) {
    md += `## Agreed (${byStatus.agree.length})\n\n`;
    byStatus.agree.forEach(item => {
      md += `- ${item.skill} > ${item.dim} > ${item.check}${item.notes ? ' — ' + item.notes : ''}\n`;
    });
  }

  const blob = new Blob([md], {type:'text/markdown'});
  download(blob, 'theory-forge-review-summary.md');
}

function download(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}
